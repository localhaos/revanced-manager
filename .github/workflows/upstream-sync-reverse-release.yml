name: Upstream Sync Reverse Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        default: v2.1.5-localhaos
      release_name:
        description: Release title
        required: true
        default: Reverse 2.1.5 LocalHaos
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'docs/patch-bundle-sources.md'

permissions:
  contents: write
  packages: read

concurrency:
  group: upstream-sync-reverse-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ORG_GRADLE_PROJECT_org.gradle.daemon: 'false'
  ORG_GRADLE_PROJECT_org.gradle.jvmargs: '-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8'
  ORG_GRADLE_PROJECT_kotlin.daemon.jvm.options: '-Xmx2g'
  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  sync-build-release:
    name: Build and publish LocalHaos APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout local fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "RELEASE_TAG=${{ github.event.inputs.release_tag || 'v2.1.5-localhaos' }}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${{ github.event.inputs.release_name || 'Reverse 2.1.5 LocalHaos' }}" >> "$GITHUB_ENV"

      - name: Verify LocalHaos checkout
        shell: bash
        run: |
          set -euo pipefail
          test "${{ github.repository }}" = "localhaos/revanced-manager"
          git rev-parse HEAD
          test -f app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          test -f app/src/main/java/app/revanced/manager/ui/screen/SelectedAppInfoScreen.kt
          grep -R "Online patch browser" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "installed_app" app/src/main/java/app/revanced/manager/ui/screen/SelectedAppInfoScreen.kt
          grep -R "Patches(R.string.tab_patches" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "createLocalPatchBundleSource" app/src/main/java/app/revanced/manager/ui/viewmodel/DownloadsViewModel.kt app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "version = 2.1.5-localhaos" app/gradle.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build independent LocalHaos APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace clean :app:assembleRelease -PsignAsDebug -PmanagerVersion=2.1.5-localhaos -PmanagerBuildLabel=localhaos-reverse-2.1.5

      - name: Collect APK and provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/apk artifacts/provenance
          find app/build/outputs/apk -type f \( -name '*.apk' -o -name '*.idsig' \) -print -exec cp -v {} artifacts/apk/ \;
          test -n "$(find artifacts/apk -type f -name '*.apk' -print -quit)"
          {
            echo "repository=${{ github.repository }}"
            echo "ref=${{ github.ref }}"
            echo "sha=$(git rev-parse HEAD)"
            echo "run_id=${{ github.run_id }}"
            echo "release_tag=$RELEASE_TAG"
            echo "release_name=$RELEASE_NAME"
            echo "version=2.1.5-localhaos"
            echo "build_label=localhaos-reverse-2.1.5"
            echo "feature_online_patch_browser=true"
            echo "feature_installed_app_source=true"
          } > artifacts/provenance/build-provenance.txt
          cat > artifacts/provenance/release-notes.md <<'EOF'
          # Reverse 2.1.5 LocalHaos

          Included LocalHaos changes:
          - Online patch browser with expanded patch source list.
          - Explicit Installed app source in APK source selector.
          - Independent version label: 2.1.5-localhaos.
          - Build provenance is attached as a release asset.
          EOF
          sed -i 's/^          //' artifacts/provenance/release-notes.md
          find artifacts -maxdepth 4 -type f -print | sort

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: localhaos-reverse-2.1.5-apk-${{ github.sha }}
          path: |
            artifacts/apk/
            artifacts/provenance/
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG" "$(git rev-parse HEAD)"
          git push origin "refs/tags/$RELEASE_TAG" --force
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file artifacts/provenance/release-notes.md --latest
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file artifacts/provenance/release-notes.md --latest
          fi
          gh release upload "$RELEASE_TAG" artifacts/apk/* artifacts/provenance/build-provenance.txt --clobber
