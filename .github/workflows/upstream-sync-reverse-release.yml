name: Upstream Sync Reverse Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        default: v2.1.5-localhaos
      release_name:
        description: Release title
        required: true
        default: Reverse LocalHaos Legacy

permissions:
  contents: write
  packages: read

concurrency:
  group: upstream-sync-reverse-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ORG_GRADLE_PROJECT_org.gradle.daemon: 'false'
  ORG_GRADLE_PROJECT_org.gradle.jvmargs: '-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8'
  ORG_GRADLE_PROJECT_kotlin.daemon.jvm.options: '-Xmx2g'
  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  sync-build-release:
    name: Build and publish LocalHaos legacy APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout local fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version[[:space:]]*=[[:space:]]*//p' app/gradle.properties | head -n 1)"
          test -n "$version"
          build_label="localhaos-reverse-${version%-localhaos}"
          build_label="${build_label// /-}"
          echo "LOCALHAOS_VERSION=$version" >> "$GITHUB_ENV"
          echo "BUILD_LABEL=$build_label" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${{ github.event.inputs.release_name }}" >> "$GITHUB_ENV"
          echo "Resolved version: $version"
          echo "Resolved build label: $build_label"

      - name: Verify LocalHaos checkout
        shell: bash
        run: |
          set -euo pipefail
          test "${{ github.repository }}" = "localhaos/revanced-manager"
          git rev-parse HEAD
          test -f app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          test -f app/src/main/java/app/revanced/manager/ui/screen/SelectedAppInfoScreen.kt
          test -f app/src/main/java/app/revanced/manager/domain/sources/GitHubBundleAutoFinder.kt
          test -f app/src/main/java/app/revanced/manager/domain/sources/RemoteSource.kt
          test -f app/src/main/java/app/revanced/manager/domain/sources/Source.kt
          test -f app/src/main/java/app/revanced/manager/util/AppArchiveImport.kt
          grep -R "Online patch browser" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "installed_app" app/src/main/java/app/revanced/manager/ui/screen/SelectedAppInfoScreen.kt
          grep -R "metadataEndpointFrom" app/src/main/java/app/revanced/manager/domain/sources/GitHubBundleAutoFinder.kt app/src/main/java/app/revanced/manager/domain/sources/RemoteSource.kt
          grep -R "Jman-Github/ReVanced-Patch-Bundles" app/src/main/java/app/revanced/manager/domain/sources/GitHubBundleAutoFinder.kt app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "LOCALHAOS_MANAGER_LATEST_RELEASE" app/src/main/java/app/revanced/manager/network/api/ReVancedAPI.kt
          grep -R "version = $LOCALHAOS_VERSION" app/gradle.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build independent LocalHaos APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/provenance
          ./gradlew --no-daemon --stacktrace clean :app:assembleRelease -PsignAsDebug -PmanagerVersion="$LOCALHAOS_VERSION" -PmanagerBuildLabel="$BUILD_LABEL" 2>&1 | tee artifacts/provenance/gradle-build.log

      - name: Collect APK and provenance
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/apk artifacts/provenance artifacts/reports artifacts/logs artifacts/manifests
          find app/build/outputs/apk -type f \( -name '*.apk' -o -name '*.idsig' \) -print -exec cp -v {} artifacts/apk/ \; || true
          find app/build/reports -type f -print -exec cp --parents -v {} artifacts/reports/ \; || true
          find . -path '*/build/tmp/*' -type f \( -name '*.log' -o -name '*.txt' \) -print -exec cp --parents -v {} artifacts/logs/ \; || true
          test -n "$(find artifacts/apk -type f -name '*.apk' -print -quit)"
          {
            echo "repository=${{ github.repository }}"
            echo "ref=${{ github.ref }}"
            echo "sha=$(git rev-parse HEAD)"
            echo "run_id=${{ github.run_id }}"
            echo "release_tag=$RELEASE_TAG"
            echo "release_name=$RELEASE_NAME"
            echo "version=$LOCALHAOS_VERSION"
            echo "build_label=$BUILD_LABEL"
            echo "feature_online_patch_browser=true"
            echo "feature_jman_patch_bundle_json_parser=true"
            echo "feature_installed_app_source=true"
          } > artifacts/provenance/build-provenance.txt
          cat > artifacts/provenance/release-notes.md <<EOF
          # $RELEASE_NAME

          Built by the manual-only legacy LocalHaos release workflow.

          Included:
          - Online patch browser.
          - Jman generated patch bundle JSON parser support.
          - Explicit installed app source in APK source selector.
          - Build provenance attached as release asset.
          EOF
          sed -i 's/^          //' artifacts/provenance/release-notes.md
          find artifacts -maxdepth 8 -type f -print | sort

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: localhaos-legacy-apk-${{ env.BUILD_LABEL }}-${{ github.sha }}
          path: |
            artifacts/apk/
            artifacts/provenance/
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG" "$(git rev-parse HEAD)"
          git push origin "refs/tags/$RELEASE_TAG" --force
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file artifacts/provenance/release-notes.md --latest
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file artifacts/provenance/release-notes.md --latest
          fi
          gh release upload "$RELEASE_TAG" artifacts/apk/* artifacts/provenance/build-provenance.txt --clobber
