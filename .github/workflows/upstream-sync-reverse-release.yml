name: Upstream Sync Reverse Release

on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: Upstream repository
        required: true
        default: ReVanced/revanced-manager
      upstream_branch:
        description: Upstream branch
        required: true
        default: main
      release_tag:
        description: Release tag to create or update
        required: true
        default: v2.1.0-localhaos
      release_name:
        description: Release title
        required: true
        default: Reverse 2.1 LocalHaos
      push_synced_main:
        description: Push merged upstream sync back to main
        required: true
        default: 'true'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'docs/patch-bundle-sources.md'

permissions:
  contents: write
  packages: read

concurrency:
  group: upstream-sync-reverse-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ORG_GRADLE_PROJECT_org.gradle.daemon: 'false'
  ORG_GRADLE_PROJECT_org.gradle.jvmargs: '-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8'
  ORG_GRADLE_PROJECT_kotlin.daemon.jvm.options: '-Xmx2g'
  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  sync-build-release:
    name: Sync upstream, build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout local fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve sync metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "UPSTREAM_REPO=${{ github.event.inputs.upstream_repo || 'ReVanced/revanced-manager' }}" >> "$GITHUB_ENV"
          echo "UPSTREAM_BRANCH=${{ github.event.inputs.upstream_branch || 'main' }}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${{ github.event.inputs.release_tag || 'v2.1.0-localhaos' }}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${{ github.event.inputs.release_name || 'Reverse 2.1 LocalHaos' }}" >> "$GITHUB_ENV"
          echo "PUSH_SYNCED_MAIN=${{ github.event.inputs.push_synced_main || 'true' }}" >> "$GITHUB_ENV"

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote remove upstream >/dev/null 2>&1 || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git remote -v

      - name: Fetch and merge upstream
        shell: bash
        run: |
          set -euo pipefail
          git fetch upstream "$UPSTREAM_BRANCH" --tags
          before_sha="$(git rev-parse HEAD)"
          upstream_sha="$(git rev-parse "upstream/$UPSTREAM_BRANCH")"
          echo "LOCAL_BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"
          echo "UPSTREAM_SHA=$upstream_sha" >> "$GITHUB_ENV"
          if git merge --no-edit -X ours "upstream/$UPSTREAM_BRANCH"; then
            echo "UPSTREAM_MERGE_STATUS=merged" >> "$GITHUB_ENV"
          else
            git status --short
            git merge --abort || true
            echo "UPSTREAM_MERGE_STATUS=conflict" >> "$GITHUB_ENV"
            exit 2
          fi
          after_sha="$(git rev-parse HEAD)"
          echo "LOCAL_AFTER_MERGE_SHA=$after_sha" >> "$GITHUB_ENV"

      - name: Re-assert LocalHaos independent version files
        shell: bash
        run: |
          set -euo pipefail
          test -f app/src/main/java/app/revanced/manager/ui/screen/settings/SourceVersionCompat.kt
          test -f app/src/main/java/app/revanced/manager/ui/screen/settings/SourceDisplayCompat.kt
          test -f app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          test -f app/src/main/java/app/revanced/manager/ui/viewmodel/DownloadsViewModel.kt
          grep -R "Patches(R.string.tab_patches" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "PatchBundlesTabContent" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "createLocalPatchBundleSource" app/src/main/java/app/revanced/manager/ui/viewmodel/DownloadsViewModel.kt app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "LOCALHAOS_MANAGER_LATEST_RELEASE" app/src/main/java/app/revanced/manager/network/api/ReVancedAPI.kt
          printf 'version = 2.1.0-localhaos\n' > app/gradle.properties
          git add app/gradle.properties
          if ! git diff --cached --quiet; then
            git commit -m "chore: assert LocalHaos reverse release version"
          fi

      - name: Push synced main
        if: ${{ env.PUSH_SYNCED_MAIN == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build independent LocalHaos APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace clean :app:assembleRelease -PsignAsDebug -PmanagerVersion=2.1.0-localhaos -PmanagerBuildLabel=localhaos-reverse-2.1

      - name: Collect APK and provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/apk artifacts/provenance
          find app/build/outputs/apk -type f \( -name '*.apk' -o -name '*.idsig' \) -print -exec cp -v {} artifacts/apk/ \;
          test -n "$(find artifacts/apk -type f -name '*.apk' -print -quit)"
          {
            echo "repository=${{ github.repository }}"
            echo "base_upstream_repo=$UPSTREAM_REPO"
            echo "base_upstream_branch=$UPSTREAM_BRANCH"
            echo "local_before_sha=$LOCAL_BEFORE_SHA"
            echo "upstream_sha=$UPSTREAM_SHA"
            echo "local_after_merge_sha=$(git rev-parse HEAD)"
            echo "release_tag=$RELEASE_TAG"
            echo "release_name=$RELEASE_NAME"
            echo "version=2.1.0-localhaos"
            echo "build_label=localhaos-reverse-2.1"
            echo "merge_strategy=git merge -X ours upstream/$UPSTREAM_BRANCH"
            echo "feature_patch_bundle_tab=true"
            echo "feature_patch_bundle_local_import=true"
            echo "feature_source_version_wrappers=true"
            echo "feature_source_display_wrappers=true"
            echo "feature_localhaos_github_updates=true"
          } > artifacts/provenance/build-provenance.txt
          cat > artifacts/provenance/release-notes.md <<'EOF'
          # Reverse 2.1 LocalHaos

          This release is built from localhaos/revanced-manager after synchronizing with ReVanced/revanced-manager upstream.

          Included LocalHaos changes:
          - Independent version label: 2.1.0-localhaos.
          - Downloads settings include a visible Patches tab for patch/bundle sources.
          - Patch/bundle sources can be imported from URL or local file.
          - Source version wrapper supports downloader packages and patch bundles.
          - Source display wrapper adds fallback display names for unnamed sources.
          - Manager app update checks are routed to localhaos GitHub Releases.
          - Build provenance is attached as a release asset.
          EOF
          sed -i 's/^          //' artifacts/provenance/release-notes.md
          find artifacts -maxdepth 4 -type f -print | sort

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: localhaos-reverse-2.1-apk-${{ github.sha }}
          path: |
            artifacts/apk/
            artifacts/provenance/
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git tag -f "$RELEASE_TAG" "$(git rev-parse HEAD)"
          git push origin "refs/tags/$RELEASE_TAG" --force
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file artifacts/provenance/release-notes.md --latest
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file artifacts/provenance/release-notes.md --latest
          fi
          gh release upload "$RELEASE_TAG" artifacts/apk/* artifacts/provenance/build-provenance.txt --clobber
