name: Release

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - dev

jobs:
    release:
        name: Release
        permissions:
            contents: write
            packages: write
            id-token: write
            attestations: write
            artifact-metadata: write
        runs-on: ubuntu-latest
        env:
            GPG_PRIVATE_KEY_PRESENT: ${{ secrets.GPG_PRIVATE_KEY != '' && 'true' || 'false' }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Java
              uses: actions/setup-java@v5
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Cache Gradle
              uses: burrunan/gradle-cache-action@v3

            - name: Build
              env:
                  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
                  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
              run: ./gradlew assembleRelease

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Import GPG key
              if: env.GPG_PRIVATE_KEY_PRESENT == 'true'
              uses: crazy-max/ghaction-import-gpg@v7
              with:
                  gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
                  passphrase: ${{ secrets.GPG_PASSPHRASE }}
                  fingerprint: ${{ vars.GPG_FINGERPRINT }}

            - name: Generate fallback GPG key
              if: env.GPG_PRIVATE_KEY_PRESENT != 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  cat > gpg-batch <<'EOF'
                  %no-protection
                  Key-Type: eddsa
                  Key-Curve: ed25519
                  Key-Usage: sign
                  Name-Real: GitHub Actions Release
                  Name-Email: actions@users.noreply.github.com
                  Expire-Date: 0
                  EOF
                  gpg --batch --generate-key gpg-batch
                  rm -f gpg-batch
                  fingerprint="$(gpg --batch --list-secret-keys --with-colons actions@users.noreply.github.com | awk -F: '/^fpr:/ { print $10; exit }')"
                  test -n "$fingerprint"
                  git config --global user.signingkey "$fingerprint"
                  git config --global commit.gpgsign false
                  git config --global tag.gpgsign false
                  gpg --batch --list-secret-keys --keyid-format LONG
                  echo "Generated fallback GPG fingerprint: $fingerprint"

            - name: Setup keystore
              run: |
                  echo "${{ secrets.KEYSTORE }}" | base64 --decode > "app/keystore.jks"

            - name: Release API
              run: npx multi-semantic-release --tag-format 'api@${version}' --ignore-packages app
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
                  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}

            - name: Release
              id: release
              run: |
                  npx multi-semantic-release --tag-format 'v${version}' --ignore-packages api
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
                  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
                  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                  KEYSTORE_ENTRY_ALIAS: ${{ secrets.KEYSTORE_ENTRY_ALIAS }}
                  KEYSTORE_ENTRY_PASSWORD: ${{ secrets.KEYSTORE_ENTRY_PASSWORD }}

            - name: Attest
              if: steps.release.outputs.NEW_TAG != ''
              uses: actions/attest@v4
              with:
                  subject-name: "ReVanced Manager ${{ steps.release.outputs.NEW_TAG }}"
                  subject-path: app/build/outputs/apk/release/revanced-manager*.apk
