name: Release

on:
    workflow_dispatch:

jobs:
    release:
        name: Release
        if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
        permissions:
            contents: write
            packages: write
            id-token: write
            attestations: write
            artifact-metadata: write
        runs-on: ubuntu-latest
        env:
            GPG_PRIVATE_KEY_PRESENT: ${{ secrets.GPG_PRIVATE_KEY != '' && 'true' || 'false' }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Verify release checkout
              shell: bash
              run: |
                  set -euo pipefail
                  test "${{ github.repository }}" = "localhaos/revanced-manager"
                  git rev-parse HEAD
                  test -f app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
                  test -f app/src/main/java/app/revanced/manager/ui/screen/SelectedAppInfoScreen.kt
                  grep -R "Online patch browser" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
                  grep -R "installed_app" app/src/main/java/app/revanced/manager/ui/screen/SelectedAppInfoScreen.kt

            - name: Setup Java
              uses: actions/setup-java@v5
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Cache Gradle
              uses: burrunan/gradle-cache-action@v3

            - name: Setup keystore
              shell: bash
              run: |
                  set -euo pipefail
                  echo "${{ secrets.KEYSTORE }}" | base64 --decode > "app/keystore.jks"
                  test -s app/keystore.jks
                  keytool -list -v -keystore app/keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" >/tmp/keystore-list.txt
                  sed -n '1,80p' /tmp/keystore-list.txt

            - name: Build
              env:
                  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
                  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
              run: ./gradlew --no-daemon --stacktrace assembleRelease

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
                  cache: "npm"

            - name: Install dependencies
              run: npm install

            - name: Import GPG key
              if: env.GPG_PRIVATE_KEY_PRESENT == 'true'
              uses: crazy-max/ghaction-import-gpg@v7
              with:
                  gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
                  passphrase: ${{ secrets.GPG_PASSPHRASE }}
                  fingerprint: ${{ vars.GPG_FINGERPRINT }}

            - name: Release API
              run: npx multi-semantic-release --debug --tag-format 'api@${version}' --ignore-packages app
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
                  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}

            - name: Release
              id: release
              run: npx multi-semantic-release --debug --tag-format 'v${version}' --ignore-packages api
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
                  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
                  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                  KEYSTORE_ENTRY_ALIAS: ${{ secrets.KEYSTORE_ENTRY_ALIAS }}
                  KEYSTORE_ENTRY_PASSWORD: ${{ secrets.KEYSTORE_ENTRY_PASSWORD }}

            - name: Attest
              if: steps.release.outputs.NEW_TAG != ''
              uses: actions/attest@v4
              with:
                  subject-name: "ReVanced Manager ${{ steps.release.outputs.NEW_TAG }}"
                  subject-path: app/build/outputs/apk/release/revanced-manager*.apk
