name: Reverse 2.1 Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        default: v2.1.0
      release_name:
        description: Release title
        required: true
        default: Reverse 2.1

permissions:
  contents: write
  packages: read

concurrency:
  group: reverse-2-1-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ORG_GRADLE_PROJECT_org.gradle.daemon: 'false'
  ORG_GRADLE_PROJECT_org.gradle.jvmargs: '-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8'
  ORG_GRADLE_PROJECT_kotlin.daemon.jvm.options: '-Xmx2g'
  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: Build and publish Reverse 2.1
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Reverse 2.1 checkout
        shell: bash
        run: |
          set -euo pipefail
          test "${{ github.repository }}" = "localhaos/revanced-manager"
          git rev-parse HEAD
          test -f app/src/main/java/app/revanced/manager/util/GeneratedApkInstallHandler.kt
          test -f app/src/main/java/app/revanced/manager/domain/sources/GitHubBundleAutoFinder.kt
          test -f app/src/main/java/app/revanced/manager/ui/screen/settings/SourceVersionCompat.kt
          test -f app/src/main/java/app/revanced/manager/ui/screen/settings/SourceDisplayCompat.kt
          test -f docs/patch-bundle-sources.md
          grep -R "Patches(R.string.tab_patches" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "PatchBundlesTabContent" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "createLocalPatchBundleSource" app/src/main/java/app/revanced/manager/ui/viewmodel/DownloadsViewModel.kt app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "LOCALHAOS_MANAGER_LATEST_RELEASE" app/src/main/java/app/revanced/manager/network/api/ReVancedAPI.kt
          grep -R "version = 2.1.0" app/gradle.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Reverse 2.1 APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace clean :app:assembleRelease -PsignAsDebug -PmanagerVersion=2.1.0 -PmanagerBuildLabel=reverse-2.1

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/apk artifacts/provenance
          find app/build/outputs/apk -type f \( -name '*.apk' -o -name '*.idsig' \) -print -exec cp -v {} artifacts/apk/ \;
          {
            echo "repository=${{ github.repository }}"
            echo "ref=${{ github.ref }}"
            echo "sha=$(git rev-parse HEAD)"
            echo "run_id=${{ github.run_id }}"
            echo "tag=${{ inputs.tag }}"
            echo "release_name=${{ inputs.release_name }}"
            echo "version=2.1.0"
            echo "build_label=reverse-2.1"
            echo "feature_patch_bundle_tab=true"
            echo "feature_patch_bundle_local_import=true"
            echo "feature_source_version_wrappers=true"
            echo "feature_source_display_wrappers=true"
            echo "feature_localhaos_github_updates=true"
          } > artifacts/provenance/build-provenance.txt
          cat > artifacts/provenance/release-notes.md <<'EOF'
          # Reverse 2.1

          Included changes:
          - Downloads settings now include a visible Patches tab for patch/bundle sources.
          - Patch/bundle sources can be imported from URL or local file.
          - Source version wrapper supports downloader packages and patch bundles.
          - Source display wrapper adds fallback display names for unnamed sources.
          - Manager app update checks are routed to localhaos GitHub Releases.
          - Build provenance is attached to artifacts and release assets.
          - Generated APK install handoff and GitHub/Morphe bundle-source diagnostics are included.
          EOF
          find artifacts -maxdepth 4 -type f -print | sort

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reverse-2.1-apk-${{ github.sha }}
          path: |
            artifacts/apk/
            artifacts/provenance/
          if-no-files-found: error
          retention-days: 30

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file artifacts/provenance/release-notes.md --latest
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file artifacts/provenance/release-notes.md --latest
          fi
          gh release upload "$RELEASE_TAG" artifacts/apk/* artifacts/provenance/build-provenance.txt --clobber
