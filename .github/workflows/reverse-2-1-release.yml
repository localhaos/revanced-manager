name: Reverse 2.1 Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        default: v2.1.0
      release_name:
        description: Release title
        required: true
        default: Reverse 2.1

permissions:
  contents: write
  packages: read

concurrency:
  group: reverse-2-1-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ORG_GRADLE_PROJECT_org.gradle.daemon: 'false'
  ORG_GRADLE_PROJECT_org.gradle.jvmargs: '-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8'
  ORG_GRADLE_PROJECT_kotlin.daemon.jvm.options: '-Xmx2g'
  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: Build and publish Reverse 2.1
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "REVERSE_RELEASE_TAG=${{ github.event.inputs.tag || 'v2.1.0' }}" >> "$GITHUB_ENV"
          echo "REVERSE_RELEASE_NAME=${{ github.event.inputs.release_name || 'Reverse 2.1' }}" >> "$GITHUB_ENV"

      - name: Verify Reverse 2.1 checkout
        shell: bash
        run: |
          set -euo pipefail
          test "${{ github.repository }}" = "localhaos/revanced-manager"
          git rev-parse HEAD
          test -f app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          test -f app/src/main/java/app/revanced/manager/ui/screen/SelectedAppInfoScreen.kt
          grep -R "Online patch browser" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "installed_app" app/src/main/java/app/revanced/manager/ui/screen/SelectedAppInfoScreen.kt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Reverse 2.1 APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace clean :app:assembleRelease -PsignAsDebug -PmanagerVersion=2.1.0 -PmanagerBuildLabel=reverse-2.1

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/apk artifacts/provenance
          find app/build/outputs/apk -type f \( -name '*.apk' -o -name '*.idsig' \) -print -exec cp -v {} artifacts/apk/ \;
          test -n "$(find artifacts/apk -type f -name '*.apk' -print -quit)"
          {
            echo "repository=${{ github.repository }}"
            echo "ref=${{ github.ref }}"
            echo "sha=$(git rev-parse HEAD)"
            echo "run_id=${{ github.run_id }}"
            echo "tag=$REVERSE_RELEASE_TAG"
            echo "release_name=$REVERSE_RELEASE_NAME"
            echo "version=2.1.0"
            echo "build_label=reverse-2.1"
          } > artifacts/provenance/build-provenance.txt
          cat > artifacts/provenance/release-notes.md <<'EOF'
          # Reverse 2.1

          Legacy manual release workflow. Automatic LocalHaos releases are handled by Upstream Sync Reverse Release.
          EOF
          sed -i 's/^          //' artifacts/provenance/release-notes.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reverse-2.1-apk-${{ github.sha }}
          path: |
            artifacts/apk/
            artifacts/provenance/
          if-no-files-found: error
          retention-days: 30

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$REVERSE_RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$REVERSE_RELEASE_TAG" --force
          if gh release view "$REVERSE_RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$REVERSE_RELEASE_TAG" --title "$REVERSE_RELEASE_NAME" --notes-file artifacts/provenance/release-notes.md --latest
          else
            gh release create "$REVERSE_RELEASE_TAG" --title "$REVERSE_RELEASE_NAME" --notes-file artifacts/provenance/release-notes.md --latest
          fi
          gh release upload "$REVERSE_RELEASE_TAG" artifacts/apk/* artifacts/provenance/build-provenance.txt --clobber
