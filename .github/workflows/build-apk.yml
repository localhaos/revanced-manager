name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-apk.yml'
      - 'app/**'
      - 'api/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - '!app/src/main/assets/dep-release-trigger.txt'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/build-apk.yml'
      - 'app/**'
      - 'api/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  ORG_GRADLE_PROJECT_org.gradle.daemon: 'false'
  ORG_GRADLE_PROJECT_org.gradle.jvmargs: '-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8'
  ORG_GRADLE_PROJECT_kotlin.daemon.jvm.options: '-Xmx2g'
  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build release APK localhaos-current
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve LocalHaos build metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version[[:space:]]*=[[:space:]]*//p' app/gradle.properties | head -n 1)"
          test -n "$version"
          label="localhaos-reverse-${version%-localhaos}"
          label="${label// /-}"
          echo "LOCALHAOS_VERSION=$version" >> "$GITHUB_ENV"
          echo "LOCALHAOS_BUILD_LABEL=$label" >> "$GITHUB_ENV"
          echo "Resolved version: $version"
          echo "Resolved label: $label"

      - name: Verify checkout and LocalHaos GUI/parser/update features
        shell: bash
        run: |
          set -euo pipefail
          test "${{ github.repository }}" = "localhaos/revanced-manager"
          git rev-parse HEAD
          test -f app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          test -f app/src/main/java/app/revanced/manager/ui/screen/SelectedAppInfoScreen.kt
          test -f app/src/main/java/app/revanced/manager/domain/sources/GitHubBundleAutoFinder.kt
          test -f app/src/main/java/app/revanced/manager/domain/sources/RemoteSource.kt
          test -f app/src/main/java/app/revanced/manager/domain/sources/Source.kt
          test -f app/src/main/java/app/revanced/manager/domain/repository/PatchBundleRepository.kt
          test -f app/src/main/java/app/revanced/manager/patcher/patch/PatchBundleType.kt
          test -f app/src/main/java/app/revanced/manager/util/AppArchiveImport.kt
          test -f app/src/main/java/app/revanced/manager/util/SystemApkSource.kt
          grep -R "Online patch browser" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "installed_app" app/src/main/java/app/revanced/manager/ui/screen/SelectedAppInfoScreen.kt
          grep -R "Patches(R.string.tab_patches" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "createLocalPatchBundleSource" app/src/main/java/app/revanced/manager/ui/viewmodel/DownloadsViewModel.kt app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "githubApiReleaseListRegex" app/src/main/java/app/revanced/manager/domain/sources/GitHubBundleAutoFinder.kt
          grep -R "metadataEndpointFrom" app/src/main/java/app/revanced/manager/domain/sources/GitHubBundleAutoFinder.kt app/src/main/java/app/revanced/manager/domain/sources/RemoteSource.kt
          grep -R "Jman-Github/ReVanced-Patch-Bundles" app/src/main/java/app/revanced/manager/domain/sources/GitHubBundleAutoFinder.kt app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "revanced-latest-patches-bundle" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "displayNameFrom" app/src/main/java/app/revanced/manager/domain/repository/PatchBundleRepository.kt app/src/main/java/app/revanced/manager/domain/sources/GitHubBundleAutoFinder.kt
          grep -R "displayName" app/src/main/java/app/revanced/manager/domain/sources/Source.kt app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "cleanVersionText" app/src/main/java/app/revanced/manager/ui/screen/settings/DownloadsSettingsScreen.kt
          grep -R "validateParsedPatchList" app/src/main/java/app/revanced/manager/domain/repository/PatchBundleRepository.kt
          grep -R "contains no patches" app/src/main/java/app/revanced/manager/domain/repository/PatchBundleRepository.kt
          grep -R "PatchBundleType.detect" app/src/main/java/app/revanced/manager/domain/repository/PatchBundleRepository.kt
          grep -R "detectionOrder = listOf(AMPLE, MORPHE, REVANCED)" app/src/main/java/app/revanced/manager/patcher/patch/PatchBundleType.kt
          grep -R "UnsplitRecoveredBaseApk" app/src/main/java/app/revanced/manager/util/AppArchiveImport.kt
          grep -R "MergedSplitBundle" app/src/main/java/app/revanced/manager/util/AppArchiveImport.kt
          grep -R "mergeApkEntries" app/src/main/java/app/revanced/manager/util/AppArchiveImport.kt
          grep -R "isMergeableSplitPayloadEntry" app/src/main/java/app/revanced/manager/util/AppArchiveImport.kt
          grep -R "unsplitRank" app/src/main/java/app/revanced/manager/util/AppArchiveImport.kt
          grep -R "isRejectedFrameworkOrSplitEntry" app/src/main/java/app/revanced/manager/util/AppArchiveImport.kt
          grep -R "framework-res.apk" app/src/main/java/app/revanced/manager/util/AppArchiveImport.kt
          grep -R "copySystemBaseApk" app/src/main/java/app/revanced/manager/util/SystemApkSource.kt app/src/main/java/app/revanced/manager/ui/viewmodel/SelectedAppInfoViewModel.kt
          grep -R "systemBaseInputFile" app/src/main/java/app/revanced/manager/ui/viewmodel/SelectedAppInfoViewModel.kt
          grep -R "sourceDir" app/src/main/java/app/revanced/manager/util/SystemApkSource.kt
          grep -R "LOCALHAOS_MANAGER_LATEST_RELEASE" app/src/main/java/app/revanced/manager/network/api/ReVancedAPI.kt
          grep -R "version = $LOCALHAOS_VERSION" app/gradle.properties
          mkdir -p artifacts/provenance
          {
            echo "repository=${{ github.repository }}"
            echo "ref=${{ github.ref }}"
            echo "sha=$(git rev-parse HEAD)"
            echo "run_id=${{ github.run_id }}"
            echo "build_label=$LOCALHAOS_BUILD_LABEL"
            echo "version=$LOCALHAOS_VERSION"
            echo "feature_online_patch_browser=true"
            echo "feature_installed_app_source=true"
            echo "feature_patch_parser_release_list_normalization=true"
            echo "feature_jman_patch_bundle_json_parser=true"
            echo "feature_patch_display_validation=true"
            echo "feature_bundle_family_detection=true"
            echo "feature_localhaos_app_update=true"
            echo "feature_unsplit_apk_bundle_import=true"
            echo "feature_framework_split_filtering=true"
            echo "feature_auto_system_base_apk_source=true"
            echo "feature_split_apk_merge=true"
          } > artifacts/provenance/build-provenance.txt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Print build environment
        shell: bash
        run: |
          set -euo pipefail
          java -version
          ./gradlew --version
          git rev-parse HEAD
          echo "Build label: $LOCALHAOS_BUILD_LABEL"
          echo "Version: $LOCALHAOS_VERSION"

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace clean :app:assembleRelease -PsignAsDebug -PmanagerVersion="$LOCALHAOS_VERSION" -PmanagerBuildLabel="$LOCALHAOS_BUILD_LABEL" 2>&1 | tee artifacts/provenance/gradle-build.log

      - name: Collect build outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/apk artifacts/reports artifacts/logs artifacts/manifests artifacts/provenance
          find app/build/outputs/apk -type f \( -name '*.apk' -o -name '*.idsig' \) -print -exec cp -v {} artifacts/apk/ \; || true
          find app/build/reports -type f -print -exec cp --parents -v {} artifacts/reports/ \; || true
          find . -path '*/build/tmp/*' -type f \( -name '*.log' -o -name '*.txt' \) -print -exec cp --parents -v {} artifacts/logs/ \; || true
          find app/build -type f \( -name '*manifest*report*.txt' -o -name 'AndroidManifest.xml' \) -print -exec cp --parents -v {} artifacts/manifests/ \; || true
          find artifacts -maxdepth 8 -type f -print | sort

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: revanced-manager-apk-${{ env.LOCALHAOS_BUILD_LABEL }}-${{ github.sha }}
          path: |
            artifacts/apk/
            artifacts/provenance/
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: revanced-manager-build-diagnostics-${{ env.LOCALHAOS_BUILD_LABEL }}-${{ github.sha }}
          path: |
            artifacts/reports/
            artifacts/logs/
            artifacts/manifests/
            artifacts/provenance/
          if-no-files-found: ignore
          retention-days: 7
