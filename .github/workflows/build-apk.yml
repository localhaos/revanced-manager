name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
    -Dkotlin.daemon.jvm.options=-Xmx2g

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew --no-daemon --stacktrace --warning-mode all assembleRelease -PsignAsDebug

      - name: Collect build outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/apk artifacts/reports artifacts/logs
          find app/build/outputs/apk -type f \( -name '*.apk' -o -name '*.idsig' \) -print -exec cp -v {} artifacts/apk/ \; || true
          find app/build/reports -type f -print -exec cp --parents -v {} artifacts/reports/ \; || true
          find . -path '*/build/tmp/*' -type f \( -name '*.log' -o -name '*.txt' \) -print -exec cp --parents -v {} artifacts/logs/ \; || true
          find artifacts -type f -maxdepth 5 -print | sort

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: revanced-manager-apk-${{ github.sha }}
          path: artifacts/apk/
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: revanced-manager-build-diagnostics-${{ github.sha }}
          path: |
            artifacts/reports/
            artifacts/logs/
          if-no-files-found: ignore
          retention-days: 7
