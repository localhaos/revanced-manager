name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  ORG_GRADLE_PROJECT_org.gradle.daemon: 'false'
  ORG_GRADLE_PROJECT_org.gradle.jvmargs: '-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8'
  ORG_GRADLE_PROJECT_kotlin.daemon.jvm.options: '-Xmx2g'
  ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
  ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Print build environment
        shell: bash
        run: |
          set -euo pipefail
          java -version
          ./gradlew --version
          git rev-parse HEAD

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace --info --warning-mode all clean :app:assembleRelease -PsignAsDebug

      - name: Collect build outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/apk artifacts/reports artifacts/logs artifacts/manifests
          find app/build/outputs/apk -type f \( -name '*.apk' -o -name '*.idsig' \) -print -exec cp -v {} artifacts/apk/ \; || true
          find app/build/reports -type f -print -exec cp --parents -v {} artifacts/reports/ \; || true
          find . -path '*/build/tmp/*' -type f \( -name '*.log' -o -name '*.txt' \) -print -exec cp --parents -v {} artifacts/logs/ \; || true
          find app/build -type f \( -name '*manifest*report*.txt' -o -name 'AndroidManifest.xml' \) -print -exec cp --parents -v {} artifacts/manifests/ \; || true
          find artifacts -maxdepth 8 -type f -print | sort

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: revanced-manager-apk-${{ github.sha }}
          path: artifacts/apk/
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: revanced-manager-build-diagnostics-${{ github.sha }}
          path: |
            artifacts/reports/
            artifacts/logs/
            artifacts/manifests/
          if-no-files-found: ignore
          retention-days: 7
